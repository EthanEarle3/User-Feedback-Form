<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        
        <h1>User Feedback Form</h1>
        <form id="feedbackForm">
            <div class="input-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <div class="tooltip" id="nameTooltip">Please enter your full name.</div>
                <span class="namecharCount" id="nameCharCount">0/200</span>
            </div>
            <div class="input-group">
                <label for="email">Email:</label>
                <div class="tooltip" id="emailTooltip">Please enter a valid email address.</div>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
                <span class="emailcharCount" id="emailCharCount">0/200</span>
            </div>
            <div class="input-group">
                <label for="comments">Comments:</label>
                <textarea id="comments" name="comments" placeholder="Your Comments" required></textarea>
                <div class="tooltip" id="commentsTooltip">Please provide your feedback or comments.</div>
                <span class="commentcharCount" id="commentCharCount">0/500</span>
            </div>
            <button type="submit" id="submit">Submit</button>
            <div id="responseMessage"></div>
        </form>
    </div>
    <div id="feedback-display">
        <h2>User Feedback</h2>
    <ul id="feedbackList"></ul>
    </div>
    

    <script src="cp_1.js"></script>
</body>

</html>
